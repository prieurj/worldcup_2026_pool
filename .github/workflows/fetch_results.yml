name: Fetch Match Results

on:
  schedule:
    # Every 15 minutes from 5 PM to 2 AM UTC (1 PM - 10 PM ET match windows + extra time)
    - cron: '*/15 17-23 * 6-7 *'
    - cron: '*/15 0-2 * 6-7 *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Fetch and store results
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python fetch_results.py
